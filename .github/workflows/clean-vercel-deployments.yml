@"
name: Clean Old Vercel Deployments

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  clean-deployments:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old Vercel deployments
        env:
          VERCEL_TOKEN: `${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: `${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: `${{ secrets.VERCEL_ORG_ID }}
        run: |
          DEPLOYMENTS=$(curl -s -X GET "https://api.vercel.com/v6/deployments?projectId=`$VERCEL_PROJECT_ID&limit=100" -H "Authorization: Bearer `$VERCEL_TOKEN" -H "Content-Type: application/json")
          if echo "`$DEPLOYMENTS" | grep -q '"error"'; then
            echo "❌ Error fetching deployments: `$DEPLOYMENTS"
            exit 1
          fi
          CUTOFF=$(date -d '14 days ago' +%s%3N)
          echo "`$DEPLOYMENTS" | jq -r '.deployments[] | select(.createdAt < '`$CUTOFF') | .uid' | while read -r id; do
            echo "🗑️ Menghapus deployment: `$id"
            curl -s -X DELETE "https://api.vercel.com/v6/deployments/`$id" -H "Authorization: Bearer `$VERCEL_TOKEN" -H "Content-Type: application/json"
          done
          echo "✅ Selesai. Deployment yang lebih dari 14 hari sudah dihapus."
"@ | Out-File -FilePath ".github\workflows\clean-vercel-deployments.yml" -Encoding utf8