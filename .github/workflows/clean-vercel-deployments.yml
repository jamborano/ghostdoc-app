name: Clean Old Vercel Deployments

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old deployments
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          CUTOFF=$(date -d '14 days ago' +%s)000
          curl -s -X GET "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&limit=100" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" | \
            jq -r --argjson cutoff "$CUTOFF" '.deployments[] | select(.createdAt < $cutoff) | .uid' | \
            while read -r id; do
              echo "Deleting $id"
              curl -s -X DELETE "https://api.vercel.com/v6/deployments/$id" \
                -H "Authorization: Bearer $VERCEL_TOKEN"
            done